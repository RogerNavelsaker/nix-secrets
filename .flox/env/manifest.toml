schema-version = "1.10.0"

[install]
git.pkg-path = "git"
gh.pkg-path = "gh"
direnv.pkg-path = "direnv"
jq.pkg-path = "jq"
ripgrep.pkg-path = "ripgrep"
fd.pkg-path = "fd"
bat.pkg-path = "bat"
eza.pkg-path = "eza"
nix.pkg-path = "nix"
nixd.pkg-path = "nixd"
nixfmt-rfc-style.pkg-path = "nixfmt-rfc-style"
deadnix.pkg-path = "deadnix"
statix.pkg-path = "statix"
nix-tree.pkg-path = "nix-tree"
sops.pkg-path = "sops"
age.pkg-path = "age"
ssh-to-age.pkg-path = "ssh-to-age"
mkpasswd.pkg-path = "mkpasswd"
gnupg.pkg-path = "gnupg"
yq-go.pkg-path = "yq-go"
age-plugin-yubikey.pkg-path = "age-plugin-yubikey"

[vars]
WORKSPACE_REPO = "nix-secrets"
SOPS_AGE_KEY_FILE = "$HOME/.config/sops/age/keys.txt"

[hook]
on-activate = '''
  export REPO_ROOT="$FLOX_ENV_PROJECT"
'''

[profile]
common = """
  edit-secret() {
    if [ -z "${1:-}" ]; then
      echo "Usage: edit-secret <file>" >&2
      return 1
    fi
    sops "$1"
  }

  new-secret() {
    if [ -z "${1:-}" ]; then
      echo "Usage: new-secret <file>" >&2
      return 1
    fi
    touch "$1"
    sops "$1"
  }

  ssh-to-age-key() {
    if [ -z "${1:-}" ]; then
      echo "Usage: ssh-to-age-key <ssh-public-key-file>" >&2
      return 1
    fi
    ssh-to-age < "$1"
  }

  list-keys() {
    echo "=== Keys in .sops.yaml ==="
    yq '.keys[]' .sops.yaml
  }

  alias check='nix flake check --no-build'
  alias fmt='nixfmt .'
  alias lint-deadcode='deadnix .'
  alias lint-patterns='statix check .'
  alias lint-patterns-fix='statix fix .'
  alias show='nix flake show'
"""

[options]
systems = ["x86_64-linux"]
