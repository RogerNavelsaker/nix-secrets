    "vars": {
      "SOPS_AGE_KEY_FILE": "$HOME/.config/sops/age/keys.txt",
      "WORKSPACE_REPO": "nix-secrets"
    },
    "hook": {
      "on-activate": "  export REPO_ROOT=\"$FLOX_ENV_PROJECT\"\n"
    },
    "profile": {
      "common": "  edit-secret() {\n    if [ -z \"${1:-}\" ]; then\n      echo \"Usage: edit-secret <file>\" >&2\n      return 1\n    fi\n    sops \"$1\"\n  }\n\n  new-secret() {\n    if [ -z \"${1:-}\" ]; then\n      echo \"Usage: new-secret <file>\" >&2\n      return 1\n    fi\n    touch \"$1\"\n    sops \"$1\"\n  }\n\n  ssh-to-age-key() {\n    if [ -z \"${1:-}\" ]; then\n      echo \"Usage: ssh-to-age-key <ssh-public-key-file>\" >&2\n      return 1\n    fi\n    ssh-to-age < \"$1\"\n  }\n\n  list-keys() {\n    echo \"=== Keys in .sops.yaml ===\"\n    yq '.keys[]' .sops.yaml\n  }\n\n  alias check='nix flake check --no-build'\n  alias fmt='nixfmt .'\n  alias lint-deadcode='deadnix .'\n  alias lint-patterns='statix check .'\n  alias lint-patterns-fix='statix fix .'\n  alias show='nix flake show'\n"
    },
    "options": {
      "systems": [
        "x86_64-linux"
      ]
    }
